name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Fix serviceOf in gradle plugin
        run: |
          FILE="node_modules/@react-native/gradle-plugin/build.gradle.kts"
          sed -i '/import org.gradle.configurationcache.extensions.serviceOf/d' "$FILE"
          sed -i 's/serviceOf<ModuleRegistry>()/project.extensions.getByType(ModuleRegistry::class.java)/' "$FILE"
          echo "Patched: $(grep -n 'serviceOf' $FILE || echo 'Clean - no serviceOf found')"

      - name: Create Android project
        run: |
          npx @react-native-community/cli@12 init InstantsTemp --version 0.74.1 --skip-install
          cp -r InstantsTemp/android ./android
          rm -rf InstantsTemp

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Fix Gradle version
        run: |
          sed -i 's|gradle-[0-9.]*-all.zip|gradle-8.6-all.zip|g' android/gradle/wrapper/gradle-wrapper.properties
          cat android/gradle/wrapper/gradle-wrapper.properties

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: instants-app-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30